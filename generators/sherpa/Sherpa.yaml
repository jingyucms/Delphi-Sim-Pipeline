# M3 / Sherpa 3.0.3 (key4hep) — e+e- -> Z/gamma* -> hadrons at the Z pole.
# First-draft, MINIMAL: prove Sherpa runs in key4hep and emits readable HepMC3 that
# hepmc2fadgen can ingest. V0-stability and guaranteed b-inclusion are layered in AFTER
# the plumbing is proven (the hepmc3_audit step will tell us what's missing).
#
# Run (no container needed):
#   source /cvmfs/sw.hsf.org/key4hep/setup.sh
#   Sherpa -f <this file>          # integration phase first, then EVENTS events
# Output: sherpa_events.hepmc3 (ASCII) in CWD.

BEAMS: [11, -11]
BEAM_ENERGIES: 45.5935            # per beam -> ECMS = 91.187 GeV

PROCESSES:
- 11 -11 -> 93 93:                # 93 = jet container (light quarks + g); EW production of q qbar
    Order: {QCD: 0, EW: 2}

EVENTS: 20

EVENT_OUTPUT: HepMC3_GenEvent[sherpa_events]
