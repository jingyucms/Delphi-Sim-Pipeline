name: Smoke Test (100 events)

# Run a quick end-to-end Pythia8 generation test on every push and PR.
# CVMFS is mounted so the container can reach DELPHI / LCG software on
# /cvmfs/sft.cern.ch (LCG stack + ROOT releases),
# /cvmfs/opendata.cern.ch (DELPHI condition data), and
# /cvmfs/delphi.cern.ch (DELPHI offline software, needed for NanoAOD).
# The mandatory step is the Pythia8 generator; the DELSIM and NanoAOD
# steps are attempted and allowed to fail gracefully in CI.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    name: Pythia8 100-event smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ---------------------------------------------------------------- #
      # 1. Source code                                                     #
      #    Full history (fetch-depth: 0) is required so the change-       #
      #    detection step below can diff against the PR base branch.      #
      # ---------------------------------------------------------------- #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------- #
      # 2. CVMFS                                                           #
      #    Mounts:                                                         #
      #      sft.cern.ch       – LCG / Pythia8 releases, ROOT binaries   #
      #      opendata.cern.ch  – DELPHI open-data condition files         #
      #      delphi.cern.ch    – DELPHI offline software (NanoAOD)        #
      #    All three are forwarded into Docker containers via             #
      #    -v /cvmfs:/cvmfs:ro.                                           #
      # ---------------------------------------------------------------- #
      - name: Mount CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@v4
        with:
          cvmfs_repositories: "sft.cern.ch,opendata.cern.ch,delphi.cern.ch"

      # ---------------------------------------------------------------- #
      # 2b. Warm up CVMFS on the host                                    #
      #    autofs triggers the actual FUSE mount only on first access.   #
      #    Docker bind-mounts (-v /cvmfs:/cvmfs:ro) snapshot the host   #
      #    directory at container-start time, so we must touch each repo #
      #    here – before any docker run – to ensure they are mounted.   #
      # ---------------------------------------------------------------- #
      - name: Warm up CVMFS repositories on host
        run: |
          echo "=== Host CVMFS: triggering autofs mounts ==="
          ls /cvmfs/sft.cern.ch/lcg/views/ | head -5 || true
          ls /cvmfs/opendata.cern.ch/        | head -5 || true
          ls /cvmfs/delphi.cern.ch/          | head -5 || true
          echo "=== Host CVMFS warm-up complete ==="

      # ---------------------------------------------------------------- #
      # 3. Detect whether the Docker image needs rebuilding               #
      #    On pull_request: diff the PR against its base branch.  If     #
      #    none of the image-affecting files changed, pull the already-   #
      #    published GHCR image and skip the (slow) local build.         #
      #    On push to main: always rebuild so the cache stays fresh.     #
      # ---------------------------------------------------------------- #
      - name: Detect whether Docker image needs rebuilding
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only \
              origin/${{ github.base_ref }}...HEAD \
              -- Dockerfile pythia8_generate.cpp Makefile \
                 run_pipeline.sh kk2f_fadgen_fixer.cpp '*.txt' \
              2>/dev/null || true)
            if [ -n "$CHANGED" ]; then
              echo "rebuild=true" >> "$GITHUB_OUTPUT"
              echo "Image-affecting files changed – will rebuild:"
              echo "$CHANGED"
            else
              # Files unchanged: only skip the build if a published image
              # actually exists on GHCR.  On a cold start (no image pushed
              # yet) the manifest probe fails and we fall back to building.
              GHCR_IMAGE="ghcr.io/dickychant/delphi-pythia8-pipeline:latest"
              if docker manifest inspect "$GHCR_IMAGE" > /dev/null 2>&1; then
                echo "rebuild=false" >> "$GITHUB_OUTPUT"
                echo "No image-affecting files changed and GHCR image exists – will pull."
              else
                echo "rebuild=true" >> "$GITHUB_OUTPUT"
                echo "No image-affecting files changed but GHCR image not yet available – will build locally."
              fi
            fi
          else
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Push to main – rebuilding image."
          fi

      # ---------------------------------------------------------------- #
      # 4. Build the Docker image  (only when image files changed)        #
      # ---------------------------------------------------------------- #
      - name: Set up Docker Buildx
        if: steps.changes.outputs.rebuild == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.changes.outputs.rebuild == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Keep the image locally; no push during smoke tests.
          push: false
          load: true
          tags: delphi-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------------- #
      # 4b. Pull pre-built image  (when no image files changed on PR)    #
      #     Uses the latest image pushed to GHCR by the docker.yml       #
      #     workflow.  The image is public so no login is required.      #
      # ---------------------------------------------------------------- #
      - name: Pull pre-built image from GHCR
        if: steps.changes.outputs.rebuild == 'false'
        run: |
          docker pull ghcr.io/dickychant/delphi-pythia8-pipeline:latest
          docker tag  ghcr.io/dickychant/delphi-pythia8-pipeline:latest delphi-pipeline:ci

      # ---------------------------------------------------------------- #
      # 5. Pythia8 generation smoke test                                  #
      #    Runs pythia8_generate directly (no DELSIM) so that the test   #
      #    is fast and self-contained.  We verify that:                   #
      #      • the binary exits 0                                         #
      #      • fort.26 is produced and is non-empty                       #
      # ---------------------------------------------------------------- #
      - name: Run 100-event Pythia8 generation
        run: |
          docker run --rm \
            --name smoke_test \
            -v /cvmfs:/cvmfs:ro \
            --entrypoint bash \
            delphi-pipeline:ci \
            -c "
              set -e
              cd /work
              echo '=== Pythia8 smoke test: 100 events ==='
              ./pythia8_generate 100
              echo '=== Generation complete ==='
              ls -lh fort.26
              # Verify the file is non-empty (binary format, >0 bytes)
              [ -s fort.26 ] || { echo 'ERROR: fort.26 is empty'; exit 1; }
              echo 'PASS: fort.26 produced and non-empty'
            "

      # ---------------------------------------------------------------- #
      # 6. Optional: full DELSIM pipeline smoke test                      #
      #    Runs the complete run_pipeline.sh entrypoint (Pythia8 +        #
      #    DELSIM).  This step is allowed to fail in CI; it will succeed  #
      #    only when the DELPHI runtime is fully reachable (e.g. on a    #
      #    runner with direct access to /delphi via CVMFS or the base    #
      #    Docker image has DELPHI baked in).                             #
      # ---------------------------------------------------------------- #
      - name: Run full pipeline smoke test (100 events, allow failure)
        continue-on-error: true
        run: |
          mkdir -p /tmp/ci_output
          docker run --rm \
            -v /cvmfs:/cvmfs:ro \
            -v /tmp/ci_output:/work/output \
            delphi-pipeline:ci \
            100 ci_smoke /work/output

      # ---------------------------------------------------------------- #
      # 7. Optional: convert DELSIM output to delphi-nanoaod ROOT        #
      #    Converts simana.sdst → ROOT RNtuple using the delphi-nanoaod  #
      #    tool (https://gitlab.cern.ch/delphi/delphi-nanoaod).          #
      #    Requirements (all sourced from CVMFS inside the container):   #
      #      • /cvmfs/delphi.cern.ch/setup.sh   – DELPHI offline env     #
      #      • ROOT from /cvmfs/sft.cern.ch      – headers + libs        #
      #    Allowed to fail; step is skipped when no sdst is present.     #
      # ---------------------------------------------------------------- #
      - name: Convert DELSIM output to NanoAOD ROOT (allow failure)
        continue-on-error: true
        run: |
          SDST=$(ls /tmp/ci_output/simana_*.sdst 2>/dev/null | head -1)
          if [ -z "$SDST" ]; then
            echo "No simana.sdst found in /tmp/ci_output – skipping NanoAOD conversion."
            exit 0
          fi
          echo "Converting $SDST to delphi-nanoaod ROOT..."
          mkdir -p /tmp/nanoaod_build
          docker run --rm \
            -v /cvmfs:/cvmfs:ro \
            -v /tmp/ci_output:/work/output \
            -v /tmp/nanoaod_build:/nanoaod \
            --entrypoint bash \
            delphi-pipeline:ci \
            -c "
              set -e

              # ── Diagnose what CVMFS looks like inside the container ──
              echo '=== /cvmfs mount point ==='
              ls /cvmfs/ 2>/dev/null || echo '  (empty or not mounted)'
              echo '=== /cvmfs/sft.cern.ch/lcg/views ==='
              ls /cvmfs/sft.cern.ch/lcg/views/ 2>/dev/null || echo '  (not accessible)'
              echo '=== LCG_109 sub-dirs (if present) ==='
              ls /cvmfs/sft.cern.ch/lcg/views/LCG_109/ 2>/dev/null || echo '  (LCG_109 not found)'

              # ── LCG view (provides ROOT + CMake config needed by delphi-nanoaod) ──
              # LCG_109 was released with gcc13 on el9; try that first, then
              # fall back to older releases so CI stays green as new views appear.
              LCG_SOURCED=0
              for LCG_VIEW in \
                  /cvmfs/sft.cern.ch/lcg/views/LCG_109/x86_64-el9-gcc15-opt/setup.sh \
                  /cvmfs/sft.cern.ch/lcg/views/LCG_109/x86_64-el9-gcc13-opt/setup.sh \
                  /cvmfs/sft.cern.ch/lcg/views/LCG_106/x86_64-el9-gcc13-opt/setup.sh \
                  /cvmfs/sft.cern.ch/lcg/views/LCG_106/x86_64-el9-gcc11-opt/setup.sh \
                  /cvmfs/sft.cern.ch/lcg/views/LCG_105/x86_64-el9-gcc12-opt/setup.sh; do
                if [ -f \"\$LCG_VIEW\" ]; then
                  source \"\$LCG_VIEW\"
                  echo \"Sourced LCG view: \$LCG_VIEW\"
                  LCG_SOURCED=1
                  break
                fi
              done
              if [ \"\$LCG_SOURCED\" -eq 0 ]; then
                echo '=== Available LCG views on CVMFS ==='
                ls /cvmfs/sft.cern.ch/lcg/views/ 2>/dev/null || echo '(cannot list views)'
                echo 'ERROR: No compatible LCG view found – cannot build delphi-nanoaod without ROOT'
                exit 1
              fi

              # Clone and build delphi-nanoaod (ROOT is now on CMAKE_PREFIX_PATH)
              git clone https://gitlab.cern.ch/delphi/delphi-nanoaod.git /nanoaod/src
              cmake -S /nanoaod/src -B /nanoaod/build -DCMAKE_BUILD_TYPE=Release
              cmake --build /nanoaod/build --parallel 2

              # Locate the YAML configuration (use the first example found)
              CONFIG=\$(find /nanoaod/src -name '*.yaml' | head -1)
              CONFIG_ARG=\${CONFIG:+\"-C \$CONFIG\"}

              # Locate the sdst produced by DELSIM
              SDST_IN=\$(ls /work/output/simana_*.sdst 2>/dev/null | head -1)

              echo \"=== delphi-nanoaod conversion ===\"
              echo \"  input : \$SDST_IN\"
              echo \"  config: \${CONFIG:-<none>}\"
              echo \"  output: /work/output/delphinanoaod_100events.root\"

              /nanoaod/build/delphi-nanoaod/delphi-nanoaod \
                --pdlinput \"\$SDST_IN\" \
                \$CONFIG_ARG \
                --output /work/output/delphinanoaod_100events.root \
                --mc

              echo 'PASS: delphinanoaod_100events.root produced'
              ls -lh /work/output/delphinanoaod_100events.root
            "

      # ---------------------------------------------------------------- #
      # 8. Report and upload artifacts                                     #
      #    Always runs so CI stays informative even when optional steps   #
      #    above fail.  The delphinanoaod ROOT file (or, if conversion    #
      #    was skipped, the raw simana.sdst) is retained for 1 day so    #
      #    it can be downloaded and inspected from the Actions summary.   #
      # ---------------------------------------------------------------- #
      - name: Report full pipeline output
        if: always()
        run: |
          echo "=== Full pipeline output files ==="
          ls -lh /tmp/ci_output/ 2>/dev/null || echo "(no output files — DELSIM step skipped or failed)"

      - name: Upload pipeline output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output-${{ github.run_number }}
          # Uploads the NanoAOD ROOT file when conversion succeeded, or
          # the raw simana.sdst when only DELSIM ran, so the job always
          # produces something inspectable when the full chain ran.
          path: /tmp/ci_output/
          retention-days: 1
          if-no-files-found: warn
