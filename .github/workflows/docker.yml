name: Build Docker Image

# Triggered on pushes to main and on every pull-request when files that
# affect the image content change.
on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Dockerfile.kk2f
      - pythia8_generate.cpp
      - Makefile
      - run_pipeline.sh
      - run_kk2f_pipeline.sh
      - kk2f_fadgen_fixer.cpp
      - '*.txt'
  pull_request:
    paths:
      - Dockerfile
      - Dockerfile.kk2f
      - pythia8_generate.cpp
      - Makefile
      - run_pipeline.sh
      - run_kk2f_pipeline.sh
      - kk2f_fadgen_fixer.cpp
      - '*.txt'

jobs:
  # ------------------------------------------------------------------ #
  #  Pythia8 pipeline image  (Dockerfile)                               #
  # ------------------------------------------------------------------ #
  build-pythia8:
    name: Build delphi-pythia8-pipeline image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Only push credentials on merges to main, not on PRs from forks.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dickychant/delphi-pythia8-pipeline
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Push only on merges to main; PRs only build (no push).
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse the GitHub Actions cache to speed up repeated builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  #  KK2f pipeline image  (Dockerfile.kk2f)                            #
  # ------------------------------------------------------------------ #
  build-kk2f:
    name: Build delphi-kk2f-pipeline image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dickychant/delphi-kk2f-pipeline
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.kk2f
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
