name: Build Docker Image

# Triggered on pushes to main and on every pull-request when files that
# affect the image content change. Paths updated after the per-generator reorg
# (Dockerfiles + sources now live under generators/<gen>/; hepmc2fadgen.cpp and
# run_delsim_only.sh are baked into the pythia8 image from the repo root).
# Can also be triggered manually (workflow_dispatch) to push to GHCR and Docker Hub;
# the :latest tag is only applied when running on refs/heads/main.
on:
  push:
    branches: [main]
    paths:
      - generators/pythia8/Dockerfile
      - generators/kk2f/Dockerfile.kk2f
      - generators/pythia8/pythia8_generate.cpp
      - generators/pythia8/Makefile
      - generators/pythia8/run_pipeline.sh
      - generators/kk2f/run_kk2f_pipeline.sh
      - generators/kk2f/kk2f_fadgen_fixer.cpp
      - 'generators/pythia8/*.txt'
      - hepmc2fadgen.cpp
      - run_delsim_only.sh
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - generators/pythia8/Dockerfile
      - generators/kk2f/Dockerfile.kk2f
      - generators/pythia8/pythia8_generate.cpp
      - generators/pythia8/Makefile
      - generators/pythia8/run_pipeline.sh
      - generators/kk2f/run_kk2f_pipeline.sh
      - generators/kk2f/kk2f_fadgen_fixer.cpp
      - 'generators/pythia8/*.txt'
      - hepmc2fadgen.cpp
      - run_delsim_only.sh
      - .github/workflows/docker.yml
  # Manual trigger: publishes to both GHCR and Docker Hub.
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------ #
  #  Pythia8 pipeline image  (generators/pythia8/Dockerfile)            #
  # ------------------------------------------------------------------ #
  build-pythia8:
    name: Build delphi-pythia8-pipeline image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed to push to GHCR; GITHUB_TOKEN is injected automatically.
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # GITHUB_TOKEN is automatic — no secrets configuration required.
        # Skip on PRs to avoid issues with tokens from forked repos.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        # Only on manual dispatch; requires DOCKERHUB_USERNAME and
        # DOCKERHUB_TOKEN to be set as repository secrets.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/delphi-pythia8-pipeline
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push to GHCR on main / manual)
        uses: docker/build-push-action@v6
        with:
          # context = repo root so the image can bake the shared hepmc2fadgen.cpp +
          # run_delsim_only.sh alongside the per-generator pythia8 sources.
          context: .
          file: generators/pythia8/Dockerfile
          # Push on merges to main or manual dispatch; PRs only build.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          # Reuse the GitHub Actions cache to speed up repeated builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata (Docker Hub)
        id: meta-dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: jingyucms/delphi-pythia8
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Push to Docker Hub (on main + manual)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: generators/pythia8/Dockerfile
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  #  KK2f pipeline image  (generators/kk2f/Dockerfile.kk2f)            #
  # ------------------------------------------------------------------ #
  build-kk2f:
    name: Build delphi-kk2f-pipeline image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/delphi-kk2f-pipeline
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push to GHCR on main / manual)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: generators/kk2f/Dockerfile.kk2f
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Docker metadata (Docker Hub)
        id: meta-dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: jingyucms/delphi-kk2f-pipeline
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Push to Docker Hub (on main + manual)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: generators/kk2f/Dockerfile.kk2f
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
